  <div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title">Confirm Your Order</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="quickOrderForm" onsubmit="submitOrder(event)">
            <div class="mb-3"><label class="form-label">Selected Item</label><input type="text" id="selectedProduct" class="form-control bg-light" readonly></div>
            <div class="mb-3"><label class="form-label">Your Name</label><input type="text" id="custName" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Phone Number</label><input type="tel" id="custPhone" class="form-control" pattern="[0-9]{10}" required></div>
            <div class="mb-3"><label class="form-label">Delivery Address</label><textarea id="custAddress" class="form-control" rows="3" required></textarea></div>
            <button type="submit" class="btn btn-danger w-100 btn-lg mt-2">Place Order (COD)</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentModal;
    function openOrderPopup(productName) {
      document.getElementById('selectedProduct').value = productName;
      currentModal = new bootstrap.Modal(document.getElementById('orderModal'));
      currentModal.show();
    }
    function submitOrder(event) {
      event.preventDefault();
      let prodName = document.getElementById('selectedProduct').value;
      let name = document.getElementById('custName').value;
      let phone = document.getElementById('custPhone').value;
      alert(`🎉 Order Confirmed, ${name}!\n\nYour order for "${prodName}" has been successfully placed.\nWe will call you on ${phone} soon!`);
      currentModal.hide();
      document.getElementById('quickOrderForm').reset();
    }
  </script>
