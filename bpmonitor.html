<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BP Monitors - Jas Generic Pharmacy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    .navbar { background: #0d6efd; }
    .navbar-brand { font-size: 30px; font-weight: bold; color: white; text-decoration: none; }
    .section-title { font-size: 35px; font-weight: bold; text-align: center; margin: 40px 0; color: #dc3545; }
    .card img { height: 220px; object-fit: cover; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">⬅ Back to Home</a>
    </div>
  </nav>

  <div class="container mt-5 mb-5">
    <h2 class="section-title">Blood Pressure Monitors</h2>
    <div class="row g-4 justify-content-center">

      <div class="col-md-4">
        <div class="card h-100">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRuaNNbgqgZYzYBX9uoJS-A2cGTG77sdlrE2tMExvLfgA&s=10" alt="Digital BP Monitor">
          <div class="card-body text-center">
            <h5>Digital Upper Arm BP Monitor</h5>
            <p class="text-muted">Fully automatic & easy to read</p>
            <button class="btn btn-danger w-100" onclick="openOrderPopup('Digital Upper Arm BP Monitor')">Add</button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card h-100">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRHI3K9BfWoiWziHSgOsLmFsWDnQyHiIPX_KKs5g8APmQ&s=10" alt="Wrist BP Monitor">
          <div class="card-body text-center">
            <h5>Wrist BP Monitor</h5>
            <p class="text-muted">Compact & travel friendly</p>
            <button class="btn btn-danger w-100" onclick="openOrderPopup('Wrist BP Monitor')">Add</button>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card h-100">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQa07wsNtrSjCNRQ6QLoC0aQm2qs3dartcY7asDCvwiYg&s=10" alt="Premium BP Monitor">
          <div class="card-body text-center">
            <h5>Premium Bluetooth BP Monitor</h5>
            <p class="text-muted">Smart tracking with phone app</p>
            <button class="btn btn-danger w-100" onclick="openOrderPopup('Premium Bluetooth BP Monitor')">Add</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white">
          <h5 class="modal-title">Confirm Your Order</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="quickOrderForm" onsubmit="submitOrder(event)">
            <div class="mb-3"><label class="form-label">Selected Item</label><input type="text" id="selectedProduct" class="form-control bg-light" readonly></div>
            <div class="mb-3"><label class="form-label">Your Name</label><input type="text" id="custName" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Phone Number</label><input type="tel" id="custPhone" class="form-control" pattern="[0-9]{10}" required></div>
            <div class="mb-3"><label class="form-label">Delivery Address</label><textarea id="custAddress" class="form-control" rows="3" required></textarea></div>
            <button type="submit" class="btn btn-danger w-100 btn-lg mt-2">Place Order (COD)</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentModal;
    function openOrderPopup(productName) {
      document.getElementById('selectedProduct').value = productName;
      currentModal = new bootstrap.Modal(document.getElementById('orderModal'));
      currentModal.show();
    }
    function submitOrder(event) {
      event.preventDefault();
      let prodName = document.getElementById('selectedProduct').value;
      let name = document.getElementById('custName').value;
      let phone = document.getElementById('custPhone').value;
      alert(`🎉 Order Confirmed, ${name}!\n\nYour order for "${prodName}" has been successfully placed.\nWe will call you on ${phone} soon!`);
      currentModal.hide();
      document.getElementById('quickOrderForm').reset();
    }
  </script>
</body>
</html>
