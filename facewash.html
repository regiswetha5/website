  <!-- POPUP FORM (MODAL) - SINGLETON CONTAINER -->
  <div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Confirm Your Order</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="quickOrderForm" onsubmit="submitOrder(event)">
            
            <div class="mb-3">
              <label class="form-label">Selected Item</label>
              <input type="text" id="selectedProduct" class="form-control bg-light" readonly>
            </div>

            <div class="mb-3">
              <label class="form-label">Your Name</label>
              <input type="text" id="custName" class="form-control" placeholder="Enter your full name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" id="custPhone" class="form-control" placeholder="10 digit mobile number" pattern="[0-9]{10}" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Delivery Address</label>
              <textarea id="custAddress" class="form-control" rows="3" placeholder="Full address with pincode" required></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-lg mt-2">Place Order (Cash on Delivery)</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- JAVASCRIPT LOGIC -->
  <script>
    let currentModal;

    // Add button click panna intha function current product item-ah lock panni popup kaatum
    function openOrderPopup(productName) {
      document.getElementById('selectedProduct').value = productName;
      currentModal = new bootstrap.Modal(document.getElementById('orderModal'));
      currentModal.show();
    }

    // Details fill panni submit panna alert message logic
    function submitOrder(event) {
      event.preventDefault();
      
      let prodName = document.getElementById('selectedProduct').value;
      let name = document.getElementById('custName').value;
      let phone = document.getElementById('custPhone').value;
      
      alert(`🎉 Order Confirmed, ${name}!\n\nYour order for "${prodName}" has been successfully placed.\nWe will call you on ${phone} soon!`);
      
      currentModal.hide();
      document.getElementById('quickOrderForm').reset();
    }
  </script>
