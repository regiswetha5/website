<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart & Checkout - Jas Generic Pharmacy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: Arial, sans-serif; }
    .navbar { background: #0d6efd; }
    .navbar-brand { font-size: 30px; font-weight: bold; color: white; text-decoration: none; }
    .cart-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); margin-top: 40px; }
  </style>
</head>
<body>

  
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html.html">💊 Jas Generic Pharmacy</a>
      <a href="index.html" class="btn btn-light btn-sm">Continue Shopping</a>
    </div>
  </nav>

  <div class="container mb-5">
    <div class="row">
      
      <!-- Cart Items List -->
      <div class="col-md-7">
        <div class="cart-container">
          <h3 class="mb-4 text-primary">Your Selected Items</h3>
          <div id="cart-items-list">
            <!-- Items dynamically added will load here -->
          </div>
          <hr>
          <div class="d-flex justify-content-between">
            <h5>Total Items:</h5>
            <h5 id="total-items-count" class="text-primary font-weight-bold">0</h5>
          </div>
          <button class="btn btn-sm btn-outline-danger mt-3" onclick="clearCart()">Clear Cart</button>
        </div>
      </div>

     
      <div class="col-md-5">
        <div class="cart-container">
          <h3 class="mb-4 text-success">Customer Details</h3>
          <form id="orderForm" onsubmit="confirmOrder(event)">
            
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" id="custName" class="form-control" placeholder="Enter your name" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Phone Number</label>
              <input type="tel" id="custPhone" class="form-control" placeholder="Enter 10-digit mobile number" pattern="[0-9]{10}" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Delivery Address</label>
              <textarea id="custAddress" class="form-control" rows="3" placeholder="Enter full address with pincode" required></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Payment Method</label>
              <select class="form-control" required>
                <option value="cod">Cash on Delivery (COD)</option>
              </select>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-lg mt-3">Confirm Order</button>
          </form>
        </div>
      </div>

    </div>
  </div>

  
  <script>
    function displayCart() {
      let cart = JSON.parse(localStorage.getItem('pharmacyCart')) || [];
      let listContainer = document.getElementById('cart-items-list');
      let totalCount = document.getElementById('total-items-count');
      
      listContainer.innerHTML = "";
      
      if(cart.length === 0) {
        listContainer.innerHTML = `<p class="text-muted text-center py-4">Your cart is empty. Please add items to order!</p>`;
        totalCount.innerText = "0";
        return;
      }

      cart.forEach((item, index) => {
        listContainer.innerHTML += `
          <div class="d-flex align-items-center justify-content-between border-bottom py-3">
            <div class="d-flex align-items-center">
              <img src="${item.img}" style="width:60px; height:60px; object-fit:cover; margin-right:15px; border-radius:5px;">
              <div>
                <h6 class="mb-0">${item.name}</h6>
                <small class="text-muted">Quantity: 1</small>
              </div>
            </div>
            <button class="btn btn-sm btn-danger" onclick="removeItem(${index})">Remove</button>
          </div>
        `;
      });
      
      totalCount.innerText = cart.length;
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('pharmacyCart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('pharmacyCart', JSON.stringify(cart));
      displayCart();
    }

    function clearCart() {
      localStorage.removeItem('pharmacyCart');
      displayCart();
    }

    function confirmOrder(event) {
      event.preventDefault();
      let cart = JSON.parse(localStorage.getItem('pharmacyCart')) || [];
      
      if(cart.length === 0) {
        alert("Your cart is empty! Cannot place order.");
        return;
      }

      let name = document.getElementById('custName').value;
      let phone = document.getElementById('custPhone').value;
      
      // Order Confirmation Screen
      alert(`🎉 Thank You, ${name}!\n\nYour order has been successfully placed.\nOur delivery executive will contact you on +91 ${phone} shortly.`);
      
      localStorage.removeItem('pharmacyCart');
      window.location.href = "index.html"; 
    }

    window.onload = displayCart;
  </script>

</body>
</html>
